<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .fog-l { animation: drift 4s ease-in-out infinite; }
    .fog-l:nth-child(even) { animation-direction:reverse; animation-duration:5s; }
    @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }
  </style>
  <g stroke-linecap="round" stroke-width="3" fill="none">
    <line class="fog-l" x1="12" y1="20" x2="52" y2="20" stroke="rgba(160,175,200,.5)"/>
    <line class="fog-l" x1="8"  y1="28" x2="56" y2="28" stroke="rgba(155,170,195,.4)"/>
    <line class="fog-l" x1="14" y1="36" x2="50" y2="36" stroke="rgba(160,175,200,.45)"/>
    <line class="fog-l" x1="8"  y1="44" x2="56" y2="44" stroke="rgba(155,170,195,.35)"/>
    <line class="fog-l" x1="12" y1="52" x2="52" y2="52" stroke="rgba(160,175,200,.25)"/>
  </g>
</svg>