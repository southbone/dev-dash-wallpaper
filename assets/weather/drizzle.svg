<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .drz { animation: drizzle 1.4s linear infinite; }
    .drz:nth-child(2){animation-delay:.2s}
    .drz:nth-child(3){animation-delay:.4s}
    .drz:nth-child(4){animation-delay:.6s}
    .drz:nth-child(5){animation-delay:.8s}
    .drz:nth-child(6){animation-delay:1.0s}
    @keyframes drizzle {
      0%  {transform:translateY(0);opacity:0}
      20% {opacity:.7}
      100%{transform:translateY(14px);opacity:0}
    }
  </style>
  <circle cx="26" cy="26" r="10" fill="#8a98a8"/>
  <circle cx="38" cy="28" r="8"  fill="#8a98a8"/>
  <circle cx="18" cy="29" r="7"  fill="#8a98a8"/>
  <rect x="16" y="27" width="30" height="8" rx="1" fill="#8a98a8"/>
  <g fill="none" stroke-linecap="round" stroke-width="1.5">
    <line class="drz" x1="20" y1="42" x2="19" y2="48" stroke="rgba(140,200,255,.75)"/>
    <line class="drz" x1="26" y1="42" x2="25" y2="48" stroke="rgba(140,200,255,.75)"/>
    <line class="drz" x1="32" y1="42" x2="31" y2="48" stroke="rgba(140,200,255,.75)"/>
    <line class="drz" x1="38" y1="42" x2="37" y2="48" stroke="rgba(140,200,255,.75)"/>
    <line class="drz" x1="44" y1="42" x2="43" y2="48" stroke="rgba(140,200,255,.75)"/>
    <line class="drz" x1="23" y1="48" x2="22" y2="54" stroke="rgba(140,200,255,.5)"/>
  </g>
</svg>