<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow-moon">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="crescent">
      <rect width="64" height="64" fill="white"/>
      <circle cx="40" cy="28" r="14" fill="black"/>
    </mask>
  </defs>
  <style>
    .moon-body { animation: moon-glow 4s ease-in-out infinite; }
    .star      { animation: twinkle  3s ease-in-out infinite; }
    .star:nth-child(2){animation-delay:.8s}
    .star:nth-child(3){animation-delay:1.6s}
    @keyframes moon-glow { 0%,100%{opacity:.9} 50%{opacity:1} }
    @keyframes twinkle   { 0%,100%{opacity:.5} 50%{opacity:1} }
  </style>
  <!-- Ореол -->
  <circle cx="30" cy="32" r="22" fill="rgba(180,210,255,0.06)"/>
  <!-- Серп -->
  <g filter="url(#glow-moon)">
    <circle cx="30" cy="32" r="15" fill="#ccdff8" mask="url(#crescent)" class="moon-body"/>
  </g>
  <!-- Звёзды -->
  <circle cx="52" cy="16" r="1.8" fill="rgba(200,225,255,0.8)" class="star"/>
  <circle cx="58" cy="30" r="1.2" fill="rgba(200,225,255,0.7)" class="star"/>
  <circle cx="48" cy="8"  r="1.4" fill="rgba(200,225,255,0.75)" class="star"/>
</svg>