<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="cloud-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <style>
    .drop { animation: fall 1.2s linear infinite; }
    .d2   { animation-delay:.25s }
    .d3   { animation-delay:.5s  }
    .d4   { animation-delay:.75s }
    .d5   { animation-delay:1.0s }
    @keyframes fall {
      0%   { transform:translateY(0);  opacity:0   }
      15%  { opacity:.8 }
      85%  { opacity:.6 }
      100% { transform:translateY(18px); opacity:0 }
    }
  </style>
  <!-- Облако -->
  <g filter="url(#cloud-shadow)">
    <circle cx="26" cy="26" r="11"   fill="#7a8898"/>
    <circle cx="38" cy="28" r="9"    fill="#7a8898"/>
    <circle cx="18" cy="29" r="8"    fill="#7a8898"/>
    <rect   x="16"  y="28" width="32" height="9" rx="1" fill="#7a8898"/>
  </g>
  <!-- Капли -->
  <g fill="none" stroke-linecap="round" stroke-width="2">
    <line class="drop d1" x1="22" y1="42" x2="20" y2="50" stroke="rgba(100,180,255,.85)"/>
    <line class="drop d2" x1="30" y1="42" x2="28" y2="50" stroke="rgba(100,180,255,.85)"/>
    <line class="drop d3" x1="38" y1="42" x2="36" y2="50" stroke="rgba(100,180,255,.85)"/>
    <line class="drop d4" x1="26" y1="47" x2="24" y2="55" stroke="rgba(100,180,255,.7)"/>
    <line class="drop d5" x1="34" y1="47" x2="32" y2="55" stroke="rgba(100,180,255,.7)"/>
  </g>
</svg>